<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>花をいける</title>
<style>
:root{
  --sumi:#1a1614; --washi:#efe9dd; --washi-2:#e3dbca;
  --seiji:#7d9b8a; --seiji-dark:#4f6b5c; --tan:#b05d43;
  --line:rgba(26,22,20,.14); --shadow:rgba(26,22,20,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:"BIZ UDPGothic","Hiragino Sans","Yu Gothic",system-ui,sans-serif;
  color:var(--sumi); background:var(--sumi);
  overflow:hidden; position:fixed; width:100%;
  -webkit-user-select:none; user-select:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.screen{position:absolute;inset:0;display:none;flex-direction:column}
.screen.active{display:flex}

/* ── 作品情報画面 ── */
#intro{background:
  radial-gradient(120% 80% at 50% -10%, #2a2320 0%, var(--sumi) 60%);
  color:var(--washi);align-items:center;justify-content:center;padding:32px;text-align:center}
.intro-inner{max-width:420px;width:100%}
.brand{font-size:13px;letter-spacing:.5em;color:var(--seiji);margin:0 0 28px;padding-left:.5em}
.work-vessel{font-size:13px;letter-spacing:.3em;color:var(--washi-2);opacity:.7;margin:0 0 10px}
.work-title{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;
  font-size:clamp(32px,9vw,46px);font-weight:600;margin:0 0 6px;line-height:1.2}
.work-note{font-size:14px;color:var(--washi-2);opacity:.8;margin:18px 0 0;line-height:1.7}
.start-btn{margin-top:40px;width:100%;padding:18px;border-radius:2px;
  background:var(--seiji);color:#fff;font-size:16px;font-weight:600;letter-spacing:.1em;
  transition:background .2s}
.start-btn:active{background:var(--seiji-dark)}
.privacy{margin-top:22px;font-size:12px;color:var(--washi-2);opacity:.55;line-height:1.7}
.err-work{color:#e0a0a0}

/* ── カメラ画面 ── */
#stage{background:#000}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
#layer{position:absolute;inset:0;overflow:hidden;touch-action:none}
.bloom{position:absolute;left:0;top:0;transform-origin:center bottom;will-change:transform;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.45))}
.bloom img{display:block;width:220px;height:auto;pointer-events:none}
.bloom.selected{outline:1.5px dashed rgba(255,255,255,.7);outline-offset:6px}

/* 上部バー */
.topbar{position:absolute;top:0;left:0;right:0;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(180deg,rgba(0,0,0,.55),transparent);z-index:5}
.topbar .t-title{color:#fff;font-family:"Yu Mincho",serif;font-size:17px;flex:1}
.icon-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.14);
  color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}

/* 下部パネル */
.panel{position:absolute;left:0;right:0;bottom:0;z-index:5;
  background:linear-gradient(0deg,rgba(0,0,0,.62) 60%,transparent);
  padding:16px 0 max(16px,env(safe-area-inset-bottom))}
.tabs{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:7px 16px;border-radius:100px;font-size:14px;
  background:rgba(255,255,255,.14);color:#fff;letter-spacing:.08em}
.tab.on{background:var(--washi);color:var(--sumi);font-weight:600}
.tab-row{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-row .tab{font-size:13px;padding:6px 14px}
.thumbs{display:flex;gap:12px;padding:4px 16px 2px;overflow-x:auto;scrollbar-width:none}
.thumbs::-webkit-scrollbar{display:none}
.thumb{flex:0 0 auto;width:76px;text-align:center}
.thumb .pic{width:76px;height:76px;border-radius:10px;background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;overflow:hidden;border:1.5px solid transparent}
.thumb .pic img{width:100%;height:100%;object-fit:contain}
.thumb.on .pic{border-color:var(--seiji);background:rgba(125,155,138,.25)}
.thumb .nm{margin-top:6px;font-size:12px;color:#fff}
.empty-thumbs{color:rgba(255,255,255,.6);font-size:13px;padding:22px 16px;text-align:center;width:100%}

/* シャッター */
.shutter-wrap{display:flex;justify-content:center;padding:14px 0 4px}
.shutter{width:68px;height:68px;border-radius:50%;background:#fff;
  border:4px solid rgba(255,255,255,.5);box-shadow:0 0 0 2px rgba(0,0,0,.3)}
.shutter:active{transform:scale(.94)}

/* 操作ヒント */
.hint{position:absolute;top:64px;left:50%;transform:translateX(-50%);z-index:4;
  background:rgba(0,0,0,.5);color:#fff;font-size:12px;padding:7px 14px;border-radius:100px;
  opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap}
.hint.show{opacity:1}

/* モーダル（ネイティブダイアログ不使用） */
.modal-bg{position:absolute;inset:0;background:rgba(10,8,7,.6);z-index:20;
  display:none;align-items:center;justify-content:center;padding:28px}
.modal-bg.active{display:flex}
.modal{background:var(--washi);border-radius:6px;max-width:340px;width:100%;
  padding:24px;box-shadow:0 20px 60px var(--shadow)}
.modal h3{margin:0 0 10px;font-size:17px;font-family:"Yu Mincho",serif}
.modal p{margin:0 0 20px;font-size:14px;line-height:1.7;color:#4a4440}
.modal-row{display:flex;gap:10px}
.modal-row button{flex:1;padding:13px;border-radius:2px;font-size:15px;font-weight:600}
.m-cancel{background:var(--washi-2);color:var(--sumi)}
.m-ok{background:var(--seiji);color:#fff}
.toast{position:absolute;bottom:120px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--sumi);color:var(--washi);font-size:14px;padding:12px 22px;border-radius:100px;
  z-index:25;opacity:0;transition:all .3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── メーカーモード（学芸員用） ── */
#maker{background:var(--washi)}
.mk-top{padding:16px;background:var(--sumi);color:var(--washi)}
.mk-top .t1{font-family:"Yu Mincho",serif;font-size:17px}
.mk-top .t2{font-size:12px;opacity:.65;margin-top:3px}
.mk-stage{flex:1;position:relative;background:
  repeating-conic-gradient(var(--washi-2) 0 25%, var(--washi) 0 50%) 0 0/24px 24px;
  overflow:hidden;min-height:0}
#makerPhoto{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none}
#makerLayer{position:absolute;inset:0;touch-action:none}
.mk-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:#8a8378;font-size:14px;text-align:center;line-height:1.8;padding:20px}
.mk-panel{background:#fff;border-top:1px solid var(--line);
  padding:14px 16px max(16px,env(safe-area-inset-bottom))}
.mk-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:14px}
.mk-row select,.mk-row input[type=file]{flex:1;font-size:14px;padding:8px;
  border:1px solid var(--line);border-radius:4px;background:#fff;font-family:inherit}
.mk-thumbs{display:flex;gap:10px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
.mk-thumbs::-webkit-scrollbar{display:none}
.mk-thumbs .thumb .nm{color:var(--sumi)}
.mk-thumbs .thumb .pic{background:var(--washi-2)}
.mk-make{width:100%;padding:15px;border-radius:2px;background:var(--seiji);color:#fff;
  font-size:15px;font-weight:600;letter-spacing:.08em}
.mk-make:disabled{opacity:.4}
/* QR結果 */
.qr-sheet{position:absolute;inset:0;background:rgba(10,8,7,.55);z-index:30;
  display:none;align-items:center;justify-content:center;padding:24px}
.qr-sheet.active{display:flex}
.qr-card{background:#fff;border-radius:8px;padding:22px;max-width:360px;width:100%;
  text-align:center;box-shadow:0 24px 70px var(--shadow);max-height:90%;overflow:auto}
.qr-card canvas{width:100%;max-width:280px;height:auto;image-rendering:pixelated}
.qr-card .q-title{font-family:"Yu Mincho",serif;font-size:18px;margin:12px 0 2px}
.qr-card .q-sub{font-size:13px;color:#6a6258;margin-bottom:4px}
.qr-card .q-url{font-size:10px;color:#9a9288;word-break:break-all;margin:8px 0 14px}
.qr-card .modal-row button{padding:12px}
</style>
</head>
<body>

<!-- 作品情報画面 -->
<section id="intro" class="screen active">
  <div class="intro-inner">
    <p class="brand">花をいける</p>
    <div id="workBox">
      <p class="work-vessel" id="wVessel">—</p>
      <h1 class="work-title" id="wTitle">作品を読み込み中</h1>
      <p class="work-note" id="wNote"></p>
      <p class="work-note" id="wPreset" style="color:var(--seiji)"></p>
    </div>
    <button class="start-btn" id="startBtn">カメラをはじめる</button>
    <p class="privacy">撮影した画像は端末内でのみ処理され、<br>外部に送信されることはありません。</p>
  </div>
</section>

<!-- カメラ画面 -->
<section id="stage" class="screen">
  <video id="video" playsinline muted autoplay></video>
  <div id="layer"></div>

  <div class="topbar">
    <div class="t-title" id="stageTitle"></div>
    <button class="icon-btn" id="clearBtn" title="花を消す">🗑</button>
  </div>

  <div class="hint" id="hint">ドラッグで移動・二本指で拡大縮小と回転</div>

  <div class="panel">
    <div class="tabs" id="seasonTabs"></div>
    <div class="tab-row" id="styleTabs"></div>
    <div class="thumbs" id="thumbs"></div>
    <div class="shutter-wrap"><button class="shutter" id="shutter" title="保存"></button></div>
  </div>
</section>

<!-- メーカーモード（学芸員用・?mode=maker で起動） -->
<section id="maker" class="screen">
  <div class="mk-top">
    <div class="t1">QRコード作成</div>
    <div class="t2">学芸員用 — 作品写真の上で花を選び、来館者向けQRを作ります。写真は端末外に送信されません。</div>
  </div>
  <div class="mk-stage">
    <img id="makerPhoto" alt="">
    <div id="makerLayer"></div>
    <div class="mk-empty" id="mkEmpty">下の「作品写真」から、あらかじめ撮影した<br>花器の写真を選んでください</div>
  </div>
  <div class="mk-panel">
    <div class="mk-row"><span>作品写真</span><input type="file" id="photoInput" accept="image/*"></div>
    <div class="mk-row"><span>作品</span><select id="workSelect"></select></div>
    <div class="mk-thumbs thumbs" id="makerThumbs"></div>
    <button class="mk-make" id="makeQRBtn">この花でQRコードを作成</button>
  </div>
</section>

<!-- QR結果シート -->
<div class="qr-sheet" id="qrSheet">
  <div class="qr-card">
    <canvas id="qrCanvas" width="280" height="280"></canvas>
    <div class="q-title" id="qTitle"></div>
    <div class="q-sub" id="qSub"></div>
    <div class="q-url" id="qUrl"></div>
    <div class="modal-row">
      <button class="m-cancel" id="qClose">閉じる</button>
      <button class="m-ok" id="qSave">QR画像を保存</button>
    </div>
  </div>
</div>

<!-- モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="mTitle"></h3>
    <p id="mBody"></p>
    <div class="modal-row">
      <button class="m-cancel" id="mCancel">キャンセル</button>
      <button class="m-ok" id="mOk">OK</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* 依存ゼロQRエンコーダ（バイトモード, ECCレベルM, バージョン1-10自動, マスク0固定）
   URL程度の文字列専用。生成物はOpenCVデコーダで検証済みであること。 */
const QR = (function () {
  "use strict";
  /* GF(256) */
  const EXP = new Array(512), LOG = new Array(256);
  (function () {
    let x = 1;
    for (let i = 0; i < 255; i++) { EXP[i] = x; LOG[x] = i; x <<= 1; if (x & 0x100) x ^= 0x11d; }
    for (let i = 255; i < 512; i++) EXP[i] = EXP[i - 255];
  })();
  const gmul = (a, b) => (a === 0 || b === 0) ? 0 : EXP[LOG[a] + LOG[b]];
  function rsGen(n) {
    let g = [1];
    for (let i = 0; i < n; i++) {
      const ng = new Array(g.length + 1).fill(0);
      for (let j = 0; j < g.length; j++) { ng[j] ^= g[j]; ng[j + 1] ^= gmul(g[j], EXP[i]); }
      g = ng;
    }
    return g;
  }
  function rsEcc(data, n) {
    const gen = rsGen(n);
    const msg = data.concat(new Array(n).fill(0));
    for (let i = 0; i < data.length; i++) {
      const c = msg[i];
      if (c !== 0) for (let j = 0; j < gen.length; j++) msg[i + j] ^= gmul(gen[j], c);
    }
    return msg.slice(data.length);
  }
  /* version(M): [total, ecPerBlock, blocks1, dataCW1, blocks2, dataCW2] */
  const VER_M = {
    1: [26, 10, 1, 16, 0, 0], 2: [44, 16, 1, 28, 0, 0], 3: [70, 26, 1, 44, 0, 0],
    4: [100, 18, 2, 32, 0, 0], 5: [134, 24, 2, 43, 0, 0], 6: [172, 16, 4, 27, 0, 0],
    7: [196, 18, 4, 31, 0, 0], 8: [242, 22, 2, 38, 2, 39], 9: [292, 22, 3, 36, 2, 37],
    10: [346, 26, 4, 43, 1, 44]
  };
  const ALIGN = {
    1: [], 2: [6, 18], 3: [6, 22], 4: [6, 26], 5: [6, 30], 6: [6, 34],
    7: [6, 22, 38], 8: [6, 24, 42], 9: [6, 26, 46], 10: [6, 28, 50]
  };
  const dataCW = v => { const t = VER_M[v]; return t[2] * t[3] + t[4] * t[5]; };
  function chooseVersion(nBytes) {
    for (let v = 1; v <= 10; v++) {
      const cc = v < 10 ? 8 : 16;
      if (Math.ceil((4 + cc + nBytes * 8) / 8) <= dataCW(v)) return v;
    }
    throw new Error("data too long (v1-10, ECC M)");
  }
  function encodeData(bytes, v) {
    const bits = [];
    const put = (val, len) => { for (let i = len - 1; i >= 0; i--) bits.push((val >> i) & 1); };
    put(0b0100, 4);
    put(bytes.length, v < 10 ? 8 : 16);
    for (const b of bytes) put(b, 8);
    const capBits = dataCW(v) * 8;
    for (let i = 0; i < 4 && bits.length < capBits; i++) bits.push(0); // terminator
    while (bits.length % 8 !== 0) bits.push(0);
    const cw = [];
    for (let i = 0; i < bits.length; i += 8) {
      let b = 0; for (let j = 0; j < 8; j++) b = (b << 1) | bits[i + j];
      cw.push(b);
    }
    const pad = [0xEC, 0x11]; let k = 0;
    while (cw.length < dataCW(v)) cw.push(pad[k++ % 2]);
    return cw;
  }
  function interleave(cw, v) {
    const [, ec, b1, d1, b2, d2] = VER_M[v];
    const blocks = []; let idx = 0;
    for (let i = 0; i < b1; i++) { const d = cw.slice(idx, idx + d1); idx += d1; blocks.push([d, rsEcc(d, ec)]); }
    for (let i = 0; i < b2; i++) { const d = cw.slice(idx, idx + d2); idx += d2; blocks.push([d, rsEcc(d, ec)]); }
    const out = [];
    const maxd = Math.max(...blocks.map(b => b[0].length));
    for (let i = 0; i < maxd; i++) for (const [d] of blocks) if (i < d.length) out.push(d[i]);
    for (let i = 0; i < ec; i++) for (const [, e] of blocks) out.push(e[i]);
    return out;
  }
  function bchDigit(d) { let n = 0; while (d !== 0) { n++; d >>>= 1; } return n; }
  function bchTypeInfo(data) {
    let d = data << 10;
    while (bchDigit(d) - bchDigit(0x537) >= 0) d ^= 0x537 << (bchDigit(d) - bchDigit(0x537));
    return ((data << 10) | d) ^ 0x5412;
  }
  function buildMatrix(v, codewords) {
    const sz = v * 4 + 17;
    const M = []; for (let i = 0; i < sz; i++) M.push(new Array(sz).fill(null));
    const setFinder = (r, c) => {
      for (let dr = -1; dr <= 7; dr++) for (let dc = -1; dc <= 7; dc++) {
        const rr = r + dr, cc = c + dc;
        if (rr < 0 || rr >= sz || cc < 0 || cc >= sz) continue;
        const on = (dr >= 0 && dr <= 6 && (dc === 0 || dc === 6)) ||
                   (dc >= 0 && dc <= 6 && (dr === 0 || dr === 6)) ||
                   (dr >= 2 && dr <= 4 && dc >= 2 && dc <= 4);
        M[rr][cc] = on ? 1 : 0;
      }
    };
    setFinder(0, 0); setFinder(0, sz - 7); setFinder(sz - 7, 0);
    for (const r of ALIGN[v]) for (const c of ALIGN[v]) {         // 位置合わせ（ファインダ重複はスキップ）
      if (M[r][c] !== null) continue;
      for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++)
        M[r + dr][c + dc] = Math.max(Math.abs(dr), Math.abs(dc)) !== 1 ? 1 : 0;
    }
    for (let i = 8; i < sz - 8; i++) {                             // タイミング
      if (M[6][i] === null) M[6][i] = i % 2 === 0 ? 1 : 0;
      if (M[i][6] === null) M[i][6] = i % 2 === 0 ? 1 : 0;
    }
    for (let i = 0; i < 9; i++) {                                  // フォーマット領域予約
      if (M[8][i] === null) M[8][i] = 0;
      if (M[i][8] === null) M[i][8] = 0;
    }
    for (let i = 0; i < 8; i++) if (M[8][sz - 1 - i] === null) M[8][sz - 1 - i] = 0;
    for (let i = 0; i < 7; i++) if (M[sz - 1 - i][8] === null) M[sz - 1 - i][8] = 0;
    M[sz - 8][8] = 1;                                              // 暗モジュール
    if (v >= 7) {                                                  // バージョン情報（v7以上は必須）
      let d = v << 12;
      while (bchDigit(d) - bchDigit(0x1F25) >= 0) d ^= 0x1F25 << (bchDigit(d) - bchDigit(0x1F25));
      const vb = (v << 12) | d;
      for (let i = 0; i < 18; i++) {
        const mod = (vb >> i) & 1;
        M[Math.floor(i / 3)][i % 3 + sz - 11] = mod;               // 右上ブロック
        M[i % 3 + sz - 11][Math.floor(i / 3)] = mod;               // 左下ブロック
      }
    }
    /* データ配置（ジグザグ）＋マスク0 */
    const bits = [];
    for (const b of codewords) for (let i = 7; i >= 0; i--) bits.push((b >> i) & 1);
    let bi = 0, inc = -1, row = sz - 1;
    for (let col = sz - 1; col > 0; col -= 2) {
      if (col === 6) col--;
      while (true) {
        for (let c = 0; c < 2; c++) {
          const cc = col - c;
          if (M[row][cc] === null) {
            let dark = bi < bits.length ? bits[bi] : 0; bi++;
            if ((row + cc) % 2 === 0) dark ^= 1;                   // マスク0
            M[row][cc] = dark;
          }
        }
        row += inc;
        if (row < 0 || row >= sz) { row -= inc; inc = -inc; break; }
      }
    }
    /* フォーマット情報（レベルM=00, マスク0） */
    const fb = bchTypeInfo((0b00 << 3) | 0);
    for (let i = 0; i < 15; i++) {
      const mod = (fb >> i) & 1;
      if (i < 6) M[i][8] = mod;
      else if (i < 8) M[i + 1][8] = mod;
      else M[sz - 15 + i][8] = mod;
    }
    for (let i = 0; i < 15; i++) {
      const mod = (fb >> i) & 1;
      if (i < 8) M[8][sz - 1 - i] = mod;
      else if (i < 9) M[8][15 - i] = mod;
      else M[8][14 - i] = mod;
    }
    M[sz - 8][8] = 1;
    return M;
  }
  function encode(text) {
    const bytes = Array.from(new TextEncoder().encode(text));
    const v = chooseVersion(bytes.length);
    return buildMatrix(v, interleave(encodeData(bytes, v), v));
  }
  return { encode };

const STYLE_LABELS = {"shin": "真", "gyo": "行", "so": "草", "bunjin": "文人花", "bonsai": "盆栽", "morimono": "盛物"};
const SEASON_LABELS = {"spring": "春", "summer": "夏", "autumn": "秋", "winter": "冬"};
const SEASON_ORDER = ["spring","summer","autumn","winter"];

const $ = s => document.querySelector(s);
const el = (t,c)=>{const e=document.createElement(t); if(c) e.className=c; return e;};

/* ── 状態 ── */
let currentWork = null;
let sel = { season:null, style:null };
let placed = [];          // {node, x, y, scale, rot}
let activeBloom = null;

/* ── モーダル（Promise化） ── */
function confirmModal(title, body, okLabel="OK"){
  return new Promise(res=>{
    $("#mTitle").textContent = title;
    $("#mBody").textContent = body;
    $("#mOk").textContent = okLabel;
    $("#modalBg").classList.add("active");
    const done = v => { $("#modalBg").classList.remove("active");
      $("#mOk").onclick=null; $("#mCancel").onclick=null; res(v); };
    $("#mOk").onclick = ()=>done(true);
    $("#mCancel").onclick = ()=>done(false);
  });
}
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1800);
}

/* ── 作品特定 ── */
function LOC(){ return location; }
function loadWork(){
  const params = new URLSearchParams(LOC().search);
  const id = params.get("work");
  currentWork = WORKS.find(w=>w.id===id) || null;
  if(!currentWork){
    $("#wVessel").textContent="";
    $("#wTitle").innerHTML='<span class="err-work">作品が見つかりません</span>';
    $("#wNote").textContent="QRコードをもう一度読み取ってください。";
    $("#startBtn").disabled=true; $("#startBtn").style.opacity=.4;
    return;
  }
  $("#wVessel").textContent = currentWork.vessel;
  $("#wTitle").textContent = currentWork.title;
  $("#wNote").textContent = currentWork.note||"";
  $("#stageTitle").textContent = currentWork.title;
  const fid=params.get("f");
  const pf=fid && FLOWERS.find(x=>x.id===fid);
  $("#wPreset").textContent = pf ? `この作品には「${pf.name}」がえらばれています` : "";
}

/* ── この作品に出せる花（器適合 × 様式適合） ── */
function eligibleFlowers(){
  if(!currentWork) return [];
  return FLOWERS.filter(f=>
    f.vesselFit.includes(currentWork.mouthWidth) &&
    f.styles.some(s=>currentWork.styles.includes(s))
  );
}

/* ── タブ構築 ── */
function buildTabs(){
  const pool = eligibleFlowers();
  const seasons = SEASON_ORDER.filter(s=>pool.some(f=>f.season===s));
  const seasonBox = $("#seasonTabs"); seasonBox.innerHTML="";
  seasons.forEach(s=>{
    const b=el("button","tab"); b.textContent=SEASON_LABELS[s];
    b.onclick=()=>{ sel.season=s; sel.style=null; renderStyleTabs(); renderThumbs(); markTabs(); };
    b.dataset.season=s; seasonBox.appendChild(b);
  });
  if(seasons.length){ sel.season=seasons[0]; }
  renderStyleTabs(); renderThumbs(); markTabs();
}
function renderStyleTabs(){
  const pool = eligibleFlowers().filter(f=>f.season===sel.season);
  // 器が許す様式のみ、かつプールに存在するもの
  const styles = Object.keys(STYLE_LABELS).filter(st=>
    currentWork.styles.includes(st) && pool.some(f=>f.styles.includes(st))
  );
  const box=$("#styleTabs"); box.innerHTML="";
  const allBtn=el("button","tab"); allBtn.textContent="すべて";
  allBtn.onclick=()=>{ sel.style=null; renderThumbs(); markTabs(); };
  allBtn.dataset.style="__all__"; box.appendChild(allBtn);
  styles.forEach(st=>{
    const b=el("button","tab"); b.textContent=STYLE_LABELS[st];
    b.onclick=()=>{ sel.style=st; renderThumbs(); markTabs(); };
    b.dataset.style=st; box.appendChild(b);
  });
}
function markTabs(){
  document.querySelectorAll("#seasonTabs .tab").forEach(b=>
    b.classList.toggle("on", b.dataset.season===sel.season));
  document.querySelectorAll("#styleTabs .tab").forEach(b=>
    b.classList.toggle("on", (b.dataset.style==="__all__"&&!sel.style)||b.dataset.style===sel.style));
}
function renderThumbs(){
  let pool = eligibleFlowers().filter(f=>f.season===sel.season);
  if(sel.style) pool = pool.filter(f=>f.styles.includes(sel.style));
  const box=$("#thumbs"); box.innerHTML="";
  if(!pool.length){ const e=el("div","empty-thumbs");
    e.textContent="この様式に合う花はまだありません"; box.appendChild(e); return; }
  pool.forEach(f=>{
    const t=el("div","thumb");
    t.innerHTML=`<div class="pic"><img src="${f.img}" alt=""></div><div class="nm">${f.name}</div>`;
    t.onclick=()=>placeFlower(f);
    box.appendChild(t);
  });
}

/* ── 花を配置 ── */
function createBloom(f, layer){
  const node=el("div","bloom");
  node.innerHTML=`<img src="${f.img}" alt="${f.name}">`;
  layer.appendChild(node);
  const lw=layer.clientWidth, lh=layer.clientHeight;
  const state={node, x:lw/2, y:lh*0.62, scale:1, rot:0,
               anchor:f.anchor||{x:.5,y:.96}, flower:f};
  node._state=state;
  attachGestures(state);
  applyTransform(state);
  return state;
}
function placeFlower(f){
  const state=createBloom(f, $("#layer"));
  placed.push(state);
  selectBloom(state);
  showHint();
  return state;
}

/* ── QRプリセット（?f=花ID&s=倍率）を反映 ── */
function applyPreset(){
  const p=new URLSearchParams(LOC().search);
  const fid=p.get("f");
  if(!fid) return null;
  const f=FLOWERS.find(x=>x.id===fid);
  if(!f){ toast("指定された花が見つかりません"); return null; }
  if(!eligibleFlowers().some(x=>x.id===fid)){
    toast("この作品には合わない花の指定です"); return null; }
  sel.season=f.season; sel.style=null;
  renderStyleTabs(); renderThumbs(); markTabs();
  const st=placeFlower(f);
  const s=parseFloat(p.get("s"));
  if(s>=0.3 && s<=4){ st.scale=s; applyTransform(st); }
  toast(`「${f.name}」を生けてみましょう`);
  return st;
}
function applyTransform(s){
  const img=s.node.querySelector("img");
  const iw=img.naturalWidth||220, ih=img.naturalHeight||330;
  const dispW=220, dispH=dispW*(ih/iw);
  // アンカー点が (s.x,s.y) に来るよう左上を逆算
  const ax=s.anchor.x*dispW, ay=s.anchor.y*dispH;
  s.node.style.transform=
    `translate(${s.x-ax}px,${s.y-ay}px) rotate(${s.rot}deg) scale(${s.scale})`;
  s.node.style.transformOrigin=`${ax}px ${ay}px`;
}
function selectBloom(s){
  placed.forEach(p=>p.node.classList.remove("selected"));
  if(s){ s.node.classList.add("selected");
    s.node.parentNode.appendChild(s.node); } // 前面へ
  activeBloom=s;
}

/* ── ジェスチャ（Pointer Events自前実装・依存ゼロ） ── */
function attachGestures(s){
  const node=s.node;
  const pts=new Map();
  let start=null;
  node.addEventListener("pointerdown",e=>{
    node.setPointerCapture(e.pointerId);
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    selectBloom(s);
    if(pts.size===1){
      start={mode:"move",px:e.clientX,py:e.clientY,x:s.x,y:s.y};
    }else if(pts.size===2){
      const [a,b]=[...pts.values()];
      start={mode:"pinch",
        dist:Math.hypot(a.x-b.x,a.y-b.y),
        ang:Math.atan2(b.y-a.y,b.x-a.x),
        scale:s.scale,rot:s.rot};
    }
  });
  node.addEventListener("pointermove",e=>{
    if(!pts.has(e.pointerId))return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(start && start.mode==="move" && pts.size===1){
      s.x=start.x+(e.clientX-start.px);
      s.y=start.y+(e.clientY-start.py);
      applyTransform(s);
    }else if(pts.size===2 && start){
      const [a,b]=[...pts.values()];
      const dist=Math.hypot(a.x-b.x,a.y-b.y);
      const ang=Math.atan2(b.y-a.y,b.x-a.x);
      if(start.mode!=="pinch"){
        start={mode:"pinch",dist,ang,scale:s.scale,rot:s.rot};
      }else{
        s.scale=Math.max(.3,Math.min(4,start.scale*(dist/start.dist)));
        s.rot=start.rot+(ang-start.ang)*180/Math.PI;
        applyTransform(s);
      }
    }
  });
  const up=e=>{ pts.delete(e.pointerId);
    if(pts.size===1){ const [id]=[...pts.keys()]; const p=pts.get(id);
      start={mode:"move",px:p.x,py:p.y,x:s.x,y:s.y}; }
    if(pts.size===0) start=null; };
  node.addEventListener("pointerup",up);
  node.addEventListener("pointercancel",up);
}

let hintShown=false;
function showHint(){ if(hintShown)return; hintShown=true;
  const h=$("#hint"); h.classList.add("show");
  setTimeout(()=>h.classList.remove("show"),3200); }

/* ── カメラ起動 ── */
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}},audio:false});
    $("#video").srcObject=stream;
  }catch(err){
    await confirmModal("カメラを起動できません",
      "カメラへのアクセスが許可されているかご確認ください。","閉じる");
  }
}

/* ── 合成保存 ── */
async function capture(){
  const video=$("#video"), layer=$("#layer");
  if(!video.videoWidth){ toast("カメラの準備中です"); return; }
  const W=layer.clientWidth, H=layer.clientHeight;
  const dpr=Math.min(window.devicePixelRatio||1,2.5);
  const cv=document.createElement("canvas");
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  // カメラ映像を object-fit:cover と同等に描画
  const vr=video.videoWidth/video.videoHeight, br=W/H;
  let sw,sh,sx,sy;
  if(vr>br){ sh=video.videoHeight; sw=sh*br; sx=(video.videoWidth-sw)/2; sy=0; }
  else{ sw=video.videoWidth; sh=sw/br; sx=0; sy=(video.videoHeight-sh)/2; }
  ctx.drawImage(video,sx,sy,sw,sh,0,0,W,H);
  // 花を重ねる（選択枠は消す）
  const wasSel=activeBloom; selectBloom(null);
  for(const s of placed){
    const img=s.node.querySelector("img");
    const iw=img.naturalWidth||220, ih=img.naturalHeight||330;
    const dispW=220, dispH=dispW*(ih/iw);
    const ax=s.anchor.x*dispW, ay=s.anchor.y*dispH;
    ctx.save();
    ctx.translate(s.x,s.y);
    ctx.rotate(s.rot*Math.PI/180);
    ctx.scale(s.scale,s.scale);
    ctx.drawImage(img,-ax,-ay,dispW,dispH);
    ctx.restore();
  }
  if(wasSel) selectBloom(wasSel);
  cv.toBlob(blob=>{
    if(!blob){ toast("保存に失敗しました"); return; }
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const wid=currentWork?currentWork.id:"work";
    a.href=url; a.download=`hana_${wid}_${Date.now()}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast("画像を保存しました");
  },"image/png");
}

/* ── メーカーモード（学芸員用QR作成） ── */
let makerWork=null, makerBloom=null;
function renderMakerThumbs(){
  const box=$("#makerThumbs"); box.innerHTML="";
  const pool=FLOWERS.filter(f=>
    f.vesselFit.includes(makerWork.mouthWidth) &&
    f.styles.some(s=>makerWork.styles.includes(s)));
  if(!pool.length){ const e=el("div","empty-thumbs");
    e.textContent="この器に適合する花が登録されていません"; box.appendChild(e); return; }
  pool.forEach(f=>{
    const t=el("div","thumb");
    t.innerHTML=`<div class="pic"><img src="${f.img}" alt=""></div><div class="nm">${f.name}</div>`;
    t.onclick=()=>{
      box.querySelectorAll(".thumb").forEach(x=>x.classList.remove("on"));
      t.classList.add("on");
      if(makerBloom) makerBloom.node.remove();
      makerBloom=createBloom(f, $("#makerLayer"));
      selectBloom(null);
    };
    box.appendChild(t);
  });
}
function initMaker(){
  $("#intro").classList.remove("active");
  $("#maker").classList.add("active");
  const selEl=$("#workSelect");
  WORKS.forEach(w=>{
    const o=document.createElement("option");
    o.value=w.id; o.textContent=`${w.id}　${w.title}（${w.vessel}）`;
    selEl.appendChild(o);
  });
  makerWork=WORKS[0];
  selEl.onchange=()=>{
    makerWork=WORKS.find(w=>w.id===selEl.value);
    if(makerBloom){ makerBloom.node.remove(); makerBloom=null; }
    renderMakerThumbs();
  };
  renderMakerThumbs();
  $("#photoInput").onchange=e=>{
    const file=e.target.files && e.target.files[0];
    if(!file) return;
    const r=new FileReader();
    r.onload=()=>{
      $("#makerPhoto").src=r.result;
      $("#makerPhoto").style.display="block";
      $("#mkEmpty").style.display="none";
    };
    r.readAsDataURL(file);
  };
  $("#makeQRBtn").onclick=makeQRCard;
  $("#qClose").onclick=()=>$("#qrSheet").classList.remove("active");
  $("#qSave").onclick=saveQRCard;
}
function buildPresetURL(){
  const s=Math.round(makerBloom.scale*100)/100;
  const base=LOC().origin + LOC().pathname;
  return `${base}?work=${makerWork.id}&f=${makerBloom.flower.id}&s=${s}`;
}
function drawQRMatrix(ctx, m, px, offX, offY){
  ctx.fillStyle="#fff"; // 呼び出し側で背景済み想定でも念のため
  ctx.fillStyle="#000";
  for(let r=0;r<m.length;r++)for(let c=0;c<m.length;c++)
    if(m[r][c]) ctx.fillRect(offX+c*px, offY+r*px, px, px);
}
function makeQRCard(){
  if(!makerBloom){ toast("花を選んでください"); return; }
  const url=buildPresetURL();
  let m;
  try{ m=QR.encode(url); }
  catch(err){ toast("URLが長すぎてQR化できません"); return; }
  const cv=$("#qrCanvas");
  const qz=4, size=m.length+qz*2;
  const px=Math.max(2,Math.floor(280/size));
  cv.width=cv.height=size*px;
  const ctx=cv.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height);
  drawQRMatrix(ctx,m,px,qz*px,qz*px);
  $("#qTitle").textContent=makerWork.title;
  $("#qSub").textContent=`${makerWork.vessel} × ${makerBloom.flower.name}（倍率 ${Math.round(makerBloom.scale*100)/100}）`;
  $("#qUrl").textContent=url;
  $("#qrSheet").classList.add("active");
}
function saveQRCard(){
  const url=buildPresetURL();
  let m; try{ m=QR.encode(url); }catch(e){ toast("QR生成に失敗しました"); return; }
  const qz=4, size=m.length+qz*2, px=16;
  const W=size*px+120, H=size*px+240;
  const cv=document.createElement("canvas");
  cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,W,H);
  const offX=(W-size*px)/2;
  drawQRMatrix(ctx,m,px,offX+qz*px,40+qz*px);
  ctx.fillStyle="#000"; ctx.textAlign="center";
  ctx.font="600 34px 'Yu Mincho','Hiragino Mincho ProN',serif";
  ctx.fillText(makerWork.title, W/2, size*px+110);
  ctx.font="22px sans-serif"; ctx.fillStyle="#555";
  ctx.fillText(`${makerWork.vessel} × ${makerBloom.flower.name}`, W/2, size*px+150);
  ctx.font="18px sans-serif"; ctx.fillStyle="#999";
  ctx.fillText(`${makerWork.id} / ${makerBloom.flower.id}`, W/2, size*px+185);
  cv.toBlob(blob=>{
    if(!blob){ toast("保存に失敗しました"); return; }
    const u=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=u; a.download=`QR_${makerWork.id}_${makerBloom.flower.id}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(u),1000);
    toast("QR画像を保存しました");
  },"image/png");
}

/* ── イベント ── */
$("#startBtn").onclick=async()=>{
  if(!currentWork)return;
  $("#intro").classList.remove("active");
  $("#stage").classList.add("active");
  buildTabs();
  applyPreset();
  await startCamera();
};
$("#clearBtn").onclick=async()=>{
  if(!placed.length){ toast("花はまだありません"); return; }
  const ok=await confirmModal("花を消す","配置した花をすべて消しますか？","消す");
  if(ok){ placed.forEach(p=>p.node.remove()); placed=[]; activeBloom=null; toast("花を消しました"); }
};
$("#shutter").onclick=capture;
$("#layer").addEventListener("pointerdown",e=>{
  if(e.target.id==="layer") selectBloom(null);
});

if(new URLSearchParams(LOC().search).get("mode")==="maker"){
  initMaker();
}else{
  loadWork();
}
</script>
