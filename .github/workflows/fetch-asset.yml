# 一時的な素材中継ワークフロー（AI生成画像のダウンロード用・作業完了後に削除する）
# 実行環境のネットワークポリシーでCanva等へ直接アクセスできないため、
# Actionsランナーを中継してファイルを取得し、ブランチにコミットする。
# 使い方: _fetch_request.txt（各行「ファイル名 URL」）をこのブランチにpushすると発火し、
#         _incoming/ に取得結果がコミットされる。
name: fetch-asset (temporary relay)
on:
  push:
    branches: ['claude/ar-flower-onboarding-rd7ahn']
    paths: ['_fetch_request.txt']
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch files
        run: |
          mkdir -p _incoming
          while read -r name url; do
            [ -z "$name" ] && continue
            echo "fetching $url -> _incoming/$name"
            curl -sSL --max-time 120 -o "_incoming/$name" "$url"
          done < _fetch_request.txt
          ls -la _incoming
          file _incoming/* || true
      - name: Commit to branch
        run: |
          git config user.name "asset-relay[bot]"
          git config user.email "actions@github.com"
          git add -f _incoming
          git commit -m "chore: relay fetched assets (temporary, will be removed)"
          git push
